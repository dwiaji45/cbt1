<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT EXAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f4f7f6; }
        .navbar { background: #0e58a6 !important; }
        .soal-card { background: #fff; padding: 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; }
        .sticky-timer { position: fixed; top: 70px; right: 20px; background: #dc3545; color: #fff; padding: 8px 15px; border-radius: 8px; font-weight: bold; z-index: 99; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container"><span class="navbar-brand mb-0 h1" id="appTitle">CBT Loading...</span></div>
</nav>

<div id="app" class="container">
    <div id="loginScreen" class="row justify-content-center mt-5">
        <div class="col-md-4">
            <div class="card shadow-sm p-4">
                <h5 class="text-center mb-4">Silahkan Login</h5>
                <input type="text" id="nisn" class="form-control mb-2" placeholder="Masukkan NISN">
                <input type="password" id="pass" class="form-control mb-3" placeholder="Masukkan Password">
                <button onclick="login()" class="btn btn-primary w-100">Mulai Ujian</button>
            </div>
        </div>
    </div>

    <div id="examScreen" style="display:none;">
        <div class="sticky-timer" id="timer">Durasi: --:--</div>
        <div id="soalContainer"></div>
        <button onclick="finishExam()" class="btn btn-success btn-lg w-100 mb-5 shadow">Kirim Semua Jawaban</button>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbw56oKTvydCJcKrm3v9jIAb_lY0M65vJgTwKehYWPGOisLHO0UZ2fMuobLjxP3WiONw/exec'; // GANTI DENGAN URL DEPLOY GAS
    let user = {};
    let soalList = [];
    let config = {};

    window.onload = async () => {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getConfig' }) }).then(r => r.json());
        if(res.status === 'ok') {
            config = res.config;
            document.getElementById('appTitle').innerText = config.Judul;
        }
    };

    async function login() {
        const nisn = document.getElementById('nisn').value;
        const pass = document.getElementById('pass').value;
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', nisn, pass }) }).then(r => r.json());

        if(res.status === 'ok') {
            user = { ...res, nisn };
            loadSoal();
        } else {
            Swal.fire('Error', res.message, 'error');
        }
    }

    async function loadSoal() {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getSoal', kodeUjian: config.KodeUjian }) }).then(r => r.json());
        if(res.status === 'ok') {
            soalList = res.soal;
            renderSoal();
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('examScreen').style.display = 'block';
            startTimer(config.Durasi);
        }
    }

    function renderSoal() {
        let html = '';
        soalList.forEach((s, i) => {
            html += `
                <div class="soal-card shadow-sm">
                    <p class="fw-bold">Soal Nomor ${i+1}</p>
                    <p>${s.soal}</p>
                    ${s.opsi.map((o, idx) => `
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="soal_${s.id}" value="${String.fromCharCode(65+idx)}" id="s${s.id}_${idx}">
                            <label class="form-check-label" for="s${s.id}_${idx}">${o}</label>
                        </div>
                    `).join('')}
                </div>`;
        });
        document.getElementById('soalContainer').innerHTML = html;
    }

    function startTimer(duration) {
        let time = duration * 60;
        const display = document.getElementById('timer');
        const interval = setInterval(() => {
            let m = Math.floor(time / 60);
            let s = time % 60;
            display.innerText = `Sisa Waktu: ${m}:${s < 10 ? '0'+s : s}`;
            if (--time < 0) { clearInterval(interval); finishExam(); }
        }, 1000);
    }

    async function finishExam() {
        const jwb = [];
        soalList.forEach(s => {
            const sel = document.querySelector(`input[name="soal_${s.id}"]:checked`);
            jwb.push({ id: s.id, jawaban: sel ? sel.value : '-' });
        });

        Swal.fire({ title: 'Kirim Jawaban?', text: "Jawaban tidak bisa diubah lagi!", icon: 'warning', showCancelButton: true }).then(async (result) => {
            if (result.isConfirmed) {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'submitUjian', nisn: user.nisn, nama: user.nama, kodeUjian: config.KodeUjian, jawabanSiswa: jwb, log: 'Ujian Selesai' })
                }).then(r => r.json());
                
                Swal.fire('Berhasil!', `Skor Anda: ${res.skor}`, 'success').then(() => location.reload());
            }
        });
    }
</script>
</body>
</html>
