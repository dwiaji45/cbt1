<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Rumah Bekam Monggang</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2980b9; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .status-pending { color: orange; font-weight: bold; }
        .status-selesai { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Daftar Antrean Reservasi Pasien</h2>
    <p>Data diambil langsung dari Google Spreadsheet.</p>

    <table>
        <thead>
            <tr>
                <th>ID Booking</th>
                <th>Tgl Bekam</th>
                <th>Jam</th>
                <th>Nama Pasien</th>
                <th>No. WhatsApp</th>
                <th>Keluhan</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tabelData">
            <tr><td colspan="7" style="text-align: center;">Memuat data...</td></tr>
        </tbody>
    </table>

    <script>
        // GANTI DENGAN URL WEB APP APPS SCRIPT ANDA
        const APPS_SCRIPT_URL = 'MASUKKAN_URL_WEB_APP_ANDA_DI_SINI?action=getReservasi';

        fetch(APPS_SCRIPT_URL)
            .then(response => response.json())
            .then(result => {
                const tbody = document.getElementById('tabelData');
                tbody.innerHTML = ""; // Bersihkan tulisan "Memuat data..."

                if(result.status === "success" && result.data.length > 0) {
                    result.data.forEach(row => {
                        let statusClass = row.status.toLowerCase() === 'pending' ? 'status-pending' : 'status-selesai';
                        
                        let tr = `<tr>
                            <td>${row.id}</td>
                            <td>${new Date(row.tanggal).toLocaleDateString('id-ID')}</td>
                            <td>${row.jam}</td>
                            <td>${row.nama}</td>
                            <td><a href="https://wa.me/62${row.no_wa.substring(1)}" target="_blank">${row.no_wa}</a></td>
                            <td>${row.keluhan}</td>
                            <td class="${statusClass}">${row.status}</td>
                        </tr>`;
                        tbody.innerHTML += tr;
                    });
                } else {
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align: center;">Belum ada data reservasi.</td></tr>`;
                }
            })
            .catch(error => {
                document.getElementById('tabelData').innerHTML = `<tr><td colspan="7" style="text-align: center; color: red;">Gagal memuat data.</td></tr>`;
            });
    </script>
</body>
</html>
