<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin CBT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #f8f9fa; font-family: sans-serif; }
        .navbar { background: #2c3e50 !important; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table-container { background: white; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Admin Dashboard CBT</span>
        <button class="btn btn-outline-light btn-sm" onclick="muatData()">Refresh Data</button>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <div class="table-container shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0">Rekap Hasil Ujian Siswa</h5>
                    <input type="text" id="cariNama" class="form-control form-control-sm w-25" placeholder="Cari Nama/NISN..." onkeyup="filterTabel()">
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Waktu</th>
                                <th>NISN</th>
                                <th>Nama</th>
                                <th>Kode</th>
                                <th>Skor</th>
                                <th>Log/Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabelHasil">
                            <tr>
                                <td colspan="6" class="text-center">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT ANDA
    const API_URL = 'https://script.google.com/macros/s/AKfycbw56oKTvydCJcKrm3v9jIAb_lY0M65vJgTwKehYWPGOisLHO0UZ2fMuobLjxP3WiONw/exec'; 

    async function muatData() {
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'getRekapAdmin' })
            }).then(r => r.json());

            if (res.status === 'ok') {
                renderTabel(res.data);
            } else {
                Swal.fire('Error', 'Gagal mengambil data', 'error');
            }
        } catch (e) {
            console.error(e);
            document.getElementById('tabelHasil').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Koneksi Error/URL Belum Diisi</td></tr>';
        }
    }

    function renderTabel(data) {
        let html = '';
        if (data.length === 0) {
            html = '<tr><td colspan="6" class="text-center">Belum ada hasil ujian.</td></tr>';
        } else {
            // Urutkan berdasarkan waktu terbaru (asumsi kolom 0 adalah timestamp)
            data.reverse().forEach(row => {
                let tgl = new Date(row[0]).toLocaleString('id-ID');
                let skorClass = row[4] >= 75 ? 'text-success fw-bold' : 'text-danger fw-bold';
                html += `
                    <tr>
                        <td><small>${tgl}</small></td>
                        <td>${row[1]}</td>
                        <td>${row[2]}</td>
                        <td><span class="badge bg-info">${row[3]}</span></td>
                        <td class="${skorClass}">${row[4]}</td>
                        <td><small class="text-muted">${row[5] || '-'}</small></td>
                    </tr>
                `;
            });
        }
        document.getElementById('tabelHasil').innerHTML = html;
    }

    function filterTabel() {
        const input = document.getElementById("cariNama").value.toUpperCase();
        const tr = document.getElementById("tabelHasil").getElementsByTagName("tr");
        for (let i = 0; i < tr.length; i++) {
            let td = tr[i].getElementsByTagName("td")[2]; // Kolom Nama
            if (td) {
                let txtValue = td.textContent || td.innerText;
                tr[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }

    // Panggil saat halaman dibuka
    window.onload = muatData;
</script>

</body>
</html>
